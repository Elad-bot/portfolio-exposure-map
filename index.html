<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Portfolio Exposure Map</title>

  <style>
    html, body, #windy {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .popup-title {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .popup-row {
      margin-bottom: 3px;
    }
  </style>

  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
  <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
</head>

<body>
  <div id="windy"></div>

  <script>
    const options = {
      key: 'pt7RGRnyLEJcMOhz7yLDryx1I2LHr6hI',
      lat: 39.5,
      lon: -98.35,
      zoom: 4,
      overlay: 'wind',
      product: 'gfs',
      level: 'surface'
    };

    const locations = [
      {
        insured_name: 'ABC Construction',
        lat: 32.7767,
        lng: -96.7970,
        premium: 18750,
        product_name: 'Contractor Equipment',
        brokerage_name: 'Example Brokerage'
      },
      {
        insured_name: 'XYZ Rentals',
        lat: 29.7604,
        lng: -95.3698,
        premium: 42200,
        product_name: 'Inland Marine',
        brokerage_name: 'Example Brokerage'
      },
      {
        insured_name: 'North East Builders',
        lat: 40.7128,
        lng: -74.0060,
        premium: 28750,
        product_name: 'Builders Risk',
        brokerage_name: 'Example Brokerage'
      }
    ];

    function formatCurrency(value) {
      if (value === null || value === undefined || value === '') {
        return '';
      }

      return Number(value).toLocaleString('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 0
      });
    }

    windyInit(options, windyAPI => {
      const { map } = windyAPI;

      locations.forEach(loc => {
        L.marker([loc.lat, loc.lng])
          .addTo(map)
          .bindPopup(`
            <div class="popup-title">${loc.insured_name}</div>
            <div class="popup-row"><b>Premium:</b> ${formatCurrency(loc.premium)}</div>
            <div class="popup-row"><b>Product:</b> ${loc.product_name}</div>
            <div class="popup-row"><b>Brokerage:</b> ${loc.brokerage_name}</div>
          `);
      });
    });
  </script>
</body>
</html>
